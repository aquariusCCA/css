<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>保守 modern reset 示意</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      line-height: 1.5;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2937;
      background: #f8fafc;
      -webkit-font-smoothing: antialiased;
    }

    :where(h1, h2, h3, p) {
      margin: 0;
    }

    :where(img, picture, video, canvas, svg) {
      display: block;
      max-width: 100%;
    }

    :where(input, button, textarea, select) {
      font: inherit;
    }

    :where(button) {
      cursor: pointer;
    }

    :focus-visible {
      outline: 2px solid currentColor;
      outline-offset: 2px;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      margin-top: 20px;
      padding: 20px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgb(15 23 42 / 10%);
    }

    .hero {
      height: 160px;
      border-radius: 14px;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      display: grid;
      place-items: center;
      color: #ffffff;
      font-size: 32px;
      font-weight: 800;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .btn {
      padding: 10px 14px;
      border: 0;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>保守 modern reset 示意</h1>
    <p>這一頁直接把「小型 modern reset」寫在最上方，讓你對照筆記理解它通常在處理哪些問題。</p>

    <div class="card">
      <div class="hero">RESET</div>
      <h2 style="margin-top: 16px;">標題</h2>
      <p style="margin-top: 8px;">這裡同時示範了：body margin 歸零、標題段落 margin 管理、媒體元素自適應、按鈕游標與表單字型繼承。</p>
      <div class="actions">
        <button class="btn">主要操作</button>
        <button class="btn" disabled>禁用按鈕</button>
      </div>
    </div>
  </div>
</body>
</html>
