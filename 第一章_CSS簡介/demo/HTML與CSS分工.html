<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTML 與 CSS 分工</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.7;
      padding: 24px;
      background: #f8fafc;
      color: #0f172a;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: #ffffff;
      border: 1px solid #dbe4ee;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    h1 {
      color: #b91c1c;
      font-size: 40px;
      margin-bottom: 12px;
    }

    p {
      color: #475569;
      font-size: 18px;
    }

    code {
      background: #e2e8f0;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>HTML 負責結構</h2>
      <p>下面的 <code>h1</code> 與 <code>p</code> 代表這是一個標題和一段文字。</p>
    </div>

    <div class="card">
      <h2>CSS 負責樣式</h2>
      <h1>我的第一個網頁</h1>
      <p>這段文字的顏色、字體大小、間距，都由 CSS 控制。</p>
    </div>
  </div>
</body>
</html>
