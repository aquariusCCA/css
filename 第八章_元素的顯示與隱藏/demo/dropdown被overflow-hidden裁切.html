<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>dropdown 被 overflow hidden 裁切</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.7; padding: 24px; background: #fff7ed; color: #7c2d12; }
    .card {
      position: relative;
      max-width: 420px;
      margin: 0 auto;
      padding: 24px;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 12px 30px rgb(124 45 18 / 10%);
      overflow: hidden;
    }
    .btn {
      padding: 10px 14px;
      border: 0;
      border-radius: 10px;
      background: #ea580c;
      color: #fff;
      font-weight: 700;
    }
    .dropdown {
      position: absolute;
      top: 74px;
      left: 24px;
      width: 220px;
      padding: 12px;
      border-radius: 12px;
      background: #312e81;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Dropdown 被裁切</h1>
    <p>這個父層有 <code>overflow: hidden</code>，所以超出邊界的下拉選單會被裁掉。</p>
    <button class="btn">更多操作</button>
    <div class="dropdown">
      這裡故意讓下拉選單超出卡片底部，用來示範被裁切的問題。
    </div>
  </div>
</body>
</html>
