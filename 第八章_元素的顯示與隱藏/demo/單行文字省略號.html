<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>單行文字省略號</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.7; padding: 24px; background: #eefbf3; color: #052e16; }
    .card { max-width: 540px; margin: 0 auto; background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 12px 30px rgb(5 46 22 / 10%); }
    .title {
      width: 260px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 10px 12px;
      border-radius: 10px;
      background: #dcfce7;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>單行文字省略號</h1>
    <p class="title">這是一段很長很長很長很長的標題，用來示範文字超出後出現省略號。</p>
  </div>
</body>
</html>
