<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>overflow-x 與 overflow-y</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.7; padding: 24px; background: #eff6ff; color: #1e3a8a; }
    .panel { max-width: 820px; margin: 0 auto; background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 12px 30px rgb(30 58 138 / 10%); }
    .list { max-height: 180px; overflow-y: auto; overflow-x: hidden; border: 1px solid #bfdbfe; padding: 12px; border-radius: 12px; background: #f8fbff; }
    .row { padding: 10px; margin-bottom: 8px; border-radius: 8px; background: #dbeafe; white-space: nowrap; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>overflow-x 與 overflow-y</h1>
    <p>這個清單限制最大高度，垂直方向可捲動，水平方向則裁切避免破版。</p>
    <div class="list">
      <div class="row">通知 1：這是一段比較長的內容，用來示範清單區塊的垂直捲動效果。</div>
      <div class="row">通知 2：這是一段比較長的內容，用來示範清單區塊的垂直捲動效果。</div>
      <div class="row">通知 3：這是一段比較長的內容，用來示範清單區塊的垂直捲動效果。</div>
      <div class="row">通知 4：這是一段比較長的內容，用來示範清單區塊的垂直捲動效果。</div>
      <div class="row">通知 5：這是一段比較長的內容，用來示範清單區塊的垂直捲動效果。</div>
      <div class="row">通知 6：這是一段比較長的內容，用來示範清單區塊的垂直捲動效果。</div>
    </div>
  </div>
</body>
</html>
