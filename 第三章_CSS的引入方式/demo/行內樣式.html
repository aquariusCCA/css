<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>行內樣式</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.7; padding: 24px; background: #fff7ed; color: #431407;">
  <h1>行內樣式</h1>
  <p style="color: hotpink; font-size: 20px;">這段文字直接在標籤的 style 屬性中設定顏色與字級。</p>
  <p style="color: hotpink; font-size: 20px;">同樣的樣式如果重複出現很多次，維護成本會很高。</p>

  <h2>重點</h2>
  <ul>
    <li>樣式只作用在目前元素</li>
    <li>適合臨時測試或單一元素微調</li>
    <li>不適合大量重複使用</li>
  </ul>
</body>
</html>
