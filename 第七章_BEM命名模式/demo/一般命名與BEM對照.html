<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>一般命名與 BEM 對照</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.7;
      padding: 24px;
      background: #fff7ed;
      color: #7c2d12;
    }

    .grid {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    @media (min-width: 900px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .panel {
      padding: 24px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgb(124 45 18 / 10%);
    }

    .article {
      border: 1px solid #fed7aa;
      border-radius: 14px;
      padding: 16px;
    }

    .body {
      margin-bottom: 12px;
    }

    .button-primary,
    .button-success {
      padding: 10px 14px;
      border: 0;
      border-radius: 10px;
      color: #fff;
      font-weight: 700;
      margin-right: 8px;
    }

    .button-primary { background: #2563eb; }
    .button-success { background: #16a34a; }

    .article__body {
      margin-bottom: 12px;
    }

    .article__button {
      padding: 10px 14px;
      border: 0;
      border-radius: 10px;
      color: #fff;
      font-weight: 700;
      margin-right: 8px;
    }

    .article__button--primary { background: #2563eb; }
    .article__button--success { background: #16a34a; }
  </style>
</head>
<body>
  <div class="grid">
    <section class="panel">
      <h1>一般命名</h1>
      <div class="article">
        <div class="body">
          <p><code>.body</code> 太通用，離開上下文就不知道是誰的 body。</p>
        </div>
        <button class="button-primary">主要</button>
        <button class="button-success">成功</button>
      </div>
    </section>

    <section class="panel">
      <h1>BEM 命名</h1>
      <div class="article">
        <div class="article__body">
          <p><code>.article__body</code> 一看就知道屬於 <code>article</code> 元件。</p>
        </div>
        <button class="article__button article__button--primary">主要</button>
        <button class="article__button article__button--success">成功</button>
      </div>
    </section>
  </div>
</body>
</html>
