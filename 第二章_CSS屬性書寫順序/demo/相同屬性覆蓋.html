<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>相同屬性覆蓋</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.7;
      padding: 24px;
      background: #fff7ed;
      color: #431407;
    }

    .box {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      padding: 24px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 10px 24px rgb(67 20 7 / 10%);
    }

    .message {
      color: #ef4444;
      color: #2563eb;
      font-size: 20px;
      font-weight: 700;
    }

    pre {
      background: #431407;
      color: #ffedd5;
      padding: 16px;
      border-radius: 12px;
      overflow: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>相同屬性覆蓋</h1>
    <p class="message">這段文字最後會顯示為藍色，不是紅色。</p>
    <p>這個範例對應本章的重點：一般屬性分類順序主要影響可讀性，但同一個屬性重複出現時，後面的值會覆蓋前面的值。</p>
    <pre>.message {
  color: #ef4444;
  color: #2563eb;
}</pre>
  </div>
</body>
</html>
