<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>繼承性 文字樣式繼承</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.7;
      padding: 24px;
      background: #fff7ed;
      color: #7c2d12;
    }

    .parent {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgb(124 45 18 / 10%);
      color: #b91c1c;
      font-size: 24px;
      line-height: 1.6;
    }

    .child-override {
      color: #1d4ed8;
    }

    .box-note {
      margin-top: 16px;
      padding: 16px;
      background: #ffedd5;
      border: 2px solid #fdba74;
    }
  </style>
</head>
<body>
  <div class="parent">
    <h1>繼承性：文字樣式繼承</h1>
    <p>這段文字沒有自己設定 color 或 font-size，所以沿用父層的紅色與 24px。</p>
    <p class="child-override">這段文字自己設定了 color，因此改成藍色。</p>
    <div class="box-note">
      這個區塊本身有背景與邊框，但子元素不會自動繼承背景或邊框。
    </div>
  </div>
</body>
</html>
