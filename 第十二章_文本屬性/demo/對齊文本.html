<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>對齊文本</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.7; padding: 24px; background: #eff6ff; color: #1e3a8a; }
    .grid { max-width: 980px; margin: 0 auto; display: grid; gap: 20px; }
    @media (min-width: 900px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    .panel { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 12px 30px rgb(30 58 138 / 10%); min-height: 180px; }
    .left { text-align: left; }
    .center { text-align: center; }
    .right { text-align: right; }
  </style>
</head>
<body>
  <div class="grid">
    <section class="panel left"><h1>left</h1><p>文字靠左對齊。</p></section>
    <section class="panel center"><h1>center</h1><p>文字水平置中。</p></section>
    <section class="panel right"><h1>right</h1><p>文字靠右對齊。</p></section>
  </div>
</body>
</html>
