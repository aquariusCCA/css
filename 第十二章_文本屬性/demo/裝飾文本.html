<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>裝飾文本</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.7; padding: 24px; background: #fff7ed; color: #7c2d12; }
    .card { max-width: 820px; margin: 0 auto; background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 12px 30px rgb(124 45 18 / 10%); }
    .underline { text-decoration: underline; }
    .line-through { text-decoration: line-through; }
    .overline { text-decoration: overline; }
    .fancy { text-decoration: underline wavy #2563eb; text-underline-offset: 4px; }
    a { color: inherit; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>裝飾文本</h1>
    <p class="underline">underline</p>
    <p class="line-through">line-through</p>
    <p class="overline">overline</p>
    <p class="fancy">wavy underline + offset</p>
    <p><a href="#">這個連結示範取消預設底線。</a></p>
  </div>
</body>
</html>
