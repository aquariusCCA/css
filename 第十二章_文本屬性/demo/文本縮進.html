<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>文本縮進</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.9; padding: 24px; background: #f5f3ff; color: #2e1065; }
    .card { max-width: 760px; margin: 0 auto; background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 12px 30px rgb(46 16 101 / 10%); }
    .paragraph { text-indent: 2em; }
  </style>
</head>
<body>
  <div class="card">
    <h1>文本縮進</h1>
    <p class="paragraph">這段文字示範中文段落常見的首行縮進寫法。使用 text-indent: 2em; 時，只會讓第一行向內縮排，不會讓整段文字全部一起往右移動。</p>
  </div>
</body>
</html>
