<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>文字陰影</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.7; padding: 24px; background: #0f172a; color: #e2e8f0; }
    .card { max-width: 860px; margin: 0 auto; padding: 32px; border-radius: 20px; background: linear-gradient(135deg, #111827, #1e293b); }
    .soft { font-size: 42px; text-shadow: 2px 2px 6px rgb(0 0 0 / 35%); }
    .glow { font-size: 42px; color: #93c5fd; text-shadow: 0 0 10px rgb(147 197 253 / 70%), 0 0 22px rgb(59 130 246 / 45%); margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="soft">柔和陰影文字</h1>
    <h2 class="glow">發光文字效果</h2>
  </div>
</body>
</html>
