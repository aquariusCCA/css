name: notes-content-review
description: |
  當使用者要審查 notes/<章節>/*.md 正式 CSS 教學筆記是否技術正確、教學完整、結構合理、來源可追溯，且足以作為 demos/practice/review/appendix 等下游教材生成來源時使用。分兩階段：第一階段掃描 notes/<章節>/*.md（必要時唯讀對照 atomic/<章節>/*.md 與 origin/<章節>/*.md），建立 Notes Inventory 與問題清單，審查 CSS 概念、選擇器、屬性、值、層疊、繼承、盒模型、布局、視覺效果、響應式、範例程式碼、資產連結與 source_atomic 來源追溯，並標註問題類型、嚴重度（S1-S4）與信心；第二階段僅在使用者明確確認問題 ID 後，以最小變更修正 notes/<章節>/*.md。適用情境：使用者要求「notes content review」「notes 完成檢查」「notes 內容檢查」「審查正式 CSS 教學筆記」「檢查 notes 是否能作為下游教材來源」，或處理 meta/chapter-status.md 中「notes 完成檢查」欄位為「未開始」「進行中」或「待確認」的章節。不適用於：notes 生成或重構（屬於 notes-generation skill）、atomic 內容審查（屬於 atomic-content-review skill）、origin/atomic/資產檔案修改、demos/practice/review/appendix 等下游內容生成。
