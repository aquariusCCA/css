<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>id 選擇器</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.7; padding: 24px; }
    #pink { color: #db2777; font-weight: 700; }
  </style>
</head>
<body>
  <h1>id 選擇器</h1>
  <div id="pink">這個元素因為 id="pink" 被選中。</div>
  <div class="pink">這個元素只有 class="pink"，不會被 #pink 選中。</div>
</body>
</html>
