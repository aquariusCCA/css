<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>通配符選擇器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; line-height: 1.7; padding: 24px; }
    .box { margin-top: 16px; padding: 16px; border: 1px solid #cbd5e1; border-radius: 12px; }
  </style>
</head>
<body>
  <h1>通配符選擇器</h1>
  <p>這頁示範比較常見的用途：用 <code>*</code> 做全域初始化，而不是任意套很多顏色樣式。</p>
  <div class="box">
    <p>所有元素都先被清掉預設 margin 與 padding，並統一改成 border-box。</p>
    <ul>
      <li>列表 1</li>
      <li>列表 2</li>
    </ul>
  </div>
</body>
</html>
