<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>子選擇器</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.7; padding: 24px; }
    .nav > a { color: #dc2626; font-weight: 700; }
    div > p { color: #8b5cf6; }
  </style>
</head>
<body>
  <h1>子選擇器</h1>
  <p>`&gt;` 只選直接子元素。</p>
  <div class="nav">
    <a href="#">直接子元素</a>
    <p>
      <a href="#">不是直接子元素</a>
    </p>
  </div>
</body>
</html>
