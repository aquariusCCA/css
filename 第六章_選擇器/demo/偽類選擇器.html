<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>偽類選擇器</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.7; padding: 24px; }
    a:link { color: #333; }
    a:visited { color: #d97706; }
    a:hover { color: #2563eb; }
    a:active { color: #16a34a; }
    input:focus { background: #fef08a; }
    ul li:first-child { background: #fecdd3; }
    ul li:last-child { background: #ddd6fe; }
    ul li:nth-child(even) { background: #e0f2fe; }
  </style>
</head>
<body>
  <h1>偽類選擇器</h1>
  <p><a href="https://example.com">把滑鼠移到這裡</a></p>
  <p><input type="text" placeholder="點我取得焦點"></p>
  <ul>
    <li>第一個</li>
    <li>第二個</li>
    <li>第三個</li>
    <li>第四個</li>
  </ul>
</body>
</html>
