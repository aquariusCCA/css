<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>後代選擇器</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.7; padding: 24px; }
    .box { padding: 12px 16px; border: 1px solid #ddd; margin-bottom: 16px; }
    ol li { color: #d97706; }
    ol li a { color: #ef4444; }
    .nav li a { color: #2563eb; }
  </style>
</head>
<body>
  <h1>後代選擇器</h1>
  <p>空格代表後代關係。</p>
  <div class="box">
    <ol>
      <li>第一項</li>
      <li>第二項</li>
      <li>第三項</li>
      <li><a href="#">連結</a></li>
    </ol>
    <ul>
      <li>第一項</li>
      <li>第二項</li>
      <li>第三項</li>
      <li><a href="#">連結</a></li>
    </ul>
    <ul class="nav">
      <li>第一項</li>
      <li>第二項</li>
      <li>第三項</li>
      <li><a href="#">連結</a></li>
    </ul>
  </div>
</body>
</html>
