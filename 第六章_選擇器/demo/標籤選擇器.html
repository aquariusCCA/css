<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>標籤選擇器</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.7; padding: 24px; }
    p { color: #15803d; }
    div { color: #db2777; }
  </style>
</head>
<body>
  <h1>標籤選擇器</h1>
  <p>所有 p 標籤都會變成綠色。</p>
  <p>這也是 p 標籤。</p>
  <div>所有 div 標籤都會變成粉色。</div>
  <div>這也是 div。</div>
  <span>span 不受這兩條規則影響。</span>
</body>
</html>
