<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>多類名</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.7; padding: 24px; }
    .red { color: #dc2626; }
    .font35 { font-size: 35px; }
    .card { padding: 16px; border: 1px solid #ddd; border-radius: 12px; max-width: 600px; }
  </style>
</head>
<body>
  <h1>多類名</h1>
  <div class="card">
    <div class="red font35">Kevin</div>
    <p>同一個元素同時擁有 <code>red</code> 與 <code>font35</code>，所以同時套用兩組樣式。</p>
  </div>
</body>
</html>
