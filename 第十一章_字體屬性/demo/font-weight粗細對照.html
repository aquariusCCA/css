<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>font-weight 粗細對照</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.7;
      padding: 24px;
      background: #fff7ed;
      color: #7c2d12;
    }

    .card {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgb(124 45 18 / 10%);
    }

    .w400 { font-weight: 400; }
    .w500 { font-weight: 500; }
    .w700 { font-weight: 700; }
    .w900 { font-weight: 900; }
    .sample { margin-top: 12px; font-size: 22px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>font-weight 粗細對照</h1>
    <p class="sample w400">400 / normal</p>
    <p class="sample w500">500</p>
    <p class="sample w700">700 / bold</p>
    <p class="sample w900">900</p>
  </div>
</body>
</html>
