<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>border-radius 歷史寫法</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.7;
      padding: 24px;
      background: #fff7ed;
      color: #7c2d12;
    }

    .card {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgb(124 45 18 / 10%);
    }

    .pill {
      width: 220px;
      margin-top: 20px;
      padding: 16px 20px;
      text-align: center;
      color: #ffffff;
      background: #ea580c;
      -webkit-border-radius: 999px;
      -moz-border-radius: 999px;
      border-radius: 999px;
    }

    pre {
      background: #7c2d12;
      color: #ffedd5;
      padding: 16px;
      border-radius: 12px;
      overflow: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>border-radius 歷史寫法</h1>
    <p>這個範例對應筆記中的歷史案例。現代瀏覽器幾乎都直接支援 <code>border-radius</code>，但舊專案可能仍保留前綴版本。</p>
    <div class="pill">圓角按鈕示意</div>
    <pre>-webkit-border-radius: 999px;
-moz-border-radius: 999px;
border-radius: 999px;</pre>
  </div>
</body>
</html>
