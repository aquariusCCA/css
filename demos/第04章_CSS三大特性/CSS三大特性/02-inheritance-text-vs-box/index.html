<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>文字繼承與盒模型不繼承</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="lesson">
        <header class="lesson-header">
            <p class="eyebrow">Demo 02</p>
            <h1>子元素會繼承文字樣式，但不會自動得到父元素邊框</h1>
            <p>父元素同時設定文字樣式與盒模型樣式，觀察子元素實際得到哪些結果。</p>
        </header>

        <section class="comparison" aria-label="繼承屬性對照">
            <article class="panel">
                <p class="panel-label">畫面結果</p>
                <div class="inheritance-parent">
                    <p class="inheritance-child">龍生龍，鳳生鳳</p>
                </div>
                <div class="legend">
                    <span class="legend-text">文字顏色與字級來自父元素</span>
                    <span class="legend-box">邊框只在父元素盒子上</span>
                </div>
            </article>

            <article class="panel">
                <p class="panel-label">實際 CSS</p>
                <pre><code>.inheritance-parent {
    color: #c026d3;
    font-size: 20px;
    border: 3px solid #2563eb;
    padding: 20px;
}

.inheritance-child {
    margin: 0;
}</code></pre>
            </article>
        </section>
    </main>
</body>
</html>
