<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>不同 selector 的優先級</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="lesson">
        <header class="lesson-header">
            <p class="eyebrow">Demo 05</p>
            <h1>不同 selector 同時選到同一元素時，先比較 specificity</h1>
            <p>這裡故意把標籤選擇器寫在最後，觀察它是否能覆蓋前面的 ID 選擇器。</p>
        </header>

        <section class="comparison" aria-label="selector 優先級觀察">
            <article class="panel">
                <p class="panel-label">畫面結果</p>
                <div class="sample-stage">
                    <span class="text" id="demo">你笑起來真好看</span>
                </div>
                <div class="weight-list" aria-label="權重對照">
                    <div><strong>#demo</strong><em>(0, 1, 0, 0)</em></div>
                    <div><strong>.text</strong><em>(0, 0, 1, 0)</em></div>
                    <div><strong>span</strong><em>(0, 0, 0, 1)</em></div>
                </div>
            </article>

            <article class="panel">
                <p class="panel-label">實際 CSS</p>
                <pre><code>#demo {
    color: green;
}

.text {
    color: red;
}

span {
    color: pink;
}</code></pre>
            </article>
        </section>
    </main>
</body>
</html>
