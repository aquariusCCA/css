<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>同權重衝突與來源順序</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="lesson">
        <header class="lesson-header">
            <p class="eyebrow">Demo 01</p>
            <h1>同一 selector 重複設定時，後面的衝突宣告勝出</h1>
            <p>這個範例只觀察同一個元素的 <code>color</code> 衝突，以及沒有衝突的 <code>font-size</code> 是否保留。</p>
        </header>

        <section class="comparison" aria-label="層疊來源順序觀察">
            <article class="panel">
                <p class="panel-label">畫面結果</p>
                <div class="sample-stage">
                    <div class="cascade-target">長江後浪推前浪</div>
                    <div class="note-row">
                        <span>最後顏色：粉紅色</span>
                        <span>保留字級：12px</span>
                    </div>
                </div>
            </article>

            <article class="panel">
                <p class="panel-label">實際 CSS</p>
                <pre><code>.cascade-target {
    color: red;
    font-size: 12px;
}

.cascade-target {
    color: pink;
}</code></pre>
            </article>
        </section>
    </main>
</body>
</html>
