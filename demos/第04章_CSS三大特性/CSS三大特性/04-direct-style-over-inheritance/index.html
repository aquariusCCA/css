<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>直接樣式優先於繼承值</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="lesson">
        <header class="lesson-header">
            <p class="eyebrow">Demo 04</p>
            <h1><code>a</code> 與 <code>h1</code> 看起來沒有繼承時，先找直接樣式</h1>
            <p>左側只設定父元素；右側改成直接選到連結與標題。</p>
        </header>

        <section class="comparison" aria-label="直接樣式與繼承值對照">
            <article class="panel">
                <p class="panel-label">只設定父元素</p>
                <div class="sample-box inherited-only">
                    <a href="#">閱讀更多</a>
                    <h1>一級標題</h1>
                </div>
                <pre><code>.inherited-only {
    color: red;
    font-size: 12px;
}</code></pre>
            </article>

            <article class="panel">
                <p class="panel-label">直接選到目標元素</p>
                <div class="sample-box direct-fix">
                    <a href="#">閱讀更多</a>
                    <h1>一級標題</h1>
                </div>
                <pre><code>.direct-fix a {
    color: red;
}

.direct-fix h1 {
    font-size: 12px;
}</code></pre>
            </article>
        </section>
    </main>
</body>
</html>
