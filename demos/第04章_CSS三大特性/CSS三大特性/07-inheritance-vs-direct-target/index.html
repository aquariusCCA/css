<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>父元素權重不會搬到子元素身上</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="lesson">
        <header class="lesson-header">
            <div class="eyebrow">Demo 07</div>
            <h1>父元素權重再高，子元素直接宣告仍會勝出</h1>
            <div class="intro">左側依賴父元素繼承；右側直接選到子元素。觀察段落最後使用哪一個顏色。</div>
        </header>

        <section class="comparison" aria-label="繼承與直接選中對照">
            <article class="panel">
                <div class="panel-label">依賴父元素繼承</div>
                <div id="father" class="sample-box">
                    <p>你還是很好看</p>
                </div>
                <pre><code>#father {
    color: red !important;
}

p {
    color: pink;
}</code></pre>
            </article>

            <article class="panel">
                <div class="panel-label">直接選到子元素</div>
                <div id="father-fixed" class="sample-box">
                    <p>你還是很好看</p>
                </div>
                <pre><code>#father-fixed p {
    color: red;
}</code></pre>
            </article>
        </section>
    </main>
</body>
</html>
