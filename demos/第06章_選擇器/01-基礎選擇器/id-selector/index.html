<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>id 選擇器 Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <header>
      <p class="eyebrow">基礎選擇器</p>
      <h1>id 選擇器用 # 對應唯一元素</h1>
      <p class="intro">觀察 <code>#main-title</code> 只會選到 <code>id="main-title"</code> 的元素，不會選到同名 class。</p>
    </header>

    <section class="panel" aria-label="id 與 class 符號差異">
      <div class="sample-row">
        <div id="main-title">CSS 基礎選擇器</div>
        <p class="main-title">這段只有 <code>class="main-title"</code>，不是 id。</p>
        <p>這段沒有 id，也沒有同名 class。</p>
      </div>
    </section>

    <section class="rule-card">
      <h2>主要 CSS 規則</h2>
      <pre><code>#main-title {
  color: purple;
}</code></pre>
      <p><code>#</code> 對應 HTML 的 <code>id</code>。若寫成 <code>.main-title</code>，就會變成選 class，不是選 id。</p>
    </section>
  </main>
</body>
</html>
