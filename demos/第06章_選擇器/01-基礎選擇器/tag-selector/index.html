<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>標籤選擇器 Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <header>
      <p class="eyebrow">基礎選擇器</p>
      <h1>標籤選擇器一次選到同一種標籤</h1>
      <p class="intro">觀察 <code>p</code> 選擇器會選到兩個段落，但不會選到旁邊的 <code>div</code>。</p>
    </header>

    <section class="comparison" aria-label="標籤選擇器修改前與修改後比較">
      <article class="panel before">
        <h2>修改前</h2>
        <div class="sample">
          <p>第一段說明。</p>
          <p>第二段說明。</p>
          <div>這是提示區塊。</div>
        </div>
      </article>

      <article class="panel after">
        <h2>修改後：p</h2>
        <div class="sample">
          <p>第一段說明。</p>
          <p>第二段說明。</p>
          <div>這是提示區塊。</div>
        </div>
      </article>
    </section>

    <section class="rule-card">
      <h2>主要 CSS 規則</h2>
      <pre><code>p {
  color: green;
}</code></pre>
      <p><code>p</code> 會選到所有段落。提示區塊是 <code>div</code>，所以不會套用這條規則。</p>
    </section>
  </main>
</body>
</html>
