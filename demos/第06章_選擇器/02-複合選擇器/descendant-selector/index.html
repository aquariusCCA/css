<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>後代選擇器 Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <header>
      <p class="eyebrow">複合選擇器</p>
      <h1>後代選擇器限制某區塊裡的元素</h1>
      <p class="intro">觀察 <code>.nav a</code> 只選到 <code>.nav</code> 裡面所有層級的連結，不會影響導覽列外的連結。</p>
    </header>

    <section class="comparison" aria-label="修改前與修改後比較">
      <article class="panel before">
        <h2>修改前</h2>
        <nav class="nav">
          <ul>
            <li><a href="#">首頁</a></li>
            <li><a href="#">課程</a></li>
          </ul>
        </nav>
        <p><a href="#">閱讀更多文章</a></p>
      </article>

      <article class="panel after">
        <h2>修改後：.nav a</h2>
        <nav class="nav">
          <ul>
            <li><a href="#">首頁</a></li>
            <li><a href="#">課程</a></li>
          </ul>
        </nav>
        <p><a href="#">閱讀更多文章</a></p>
      </article>
    </section>

    <section class="rule-card">
      <h2>主要 CSS 規則</h2>
      <pre><code>.nav a {
  color: orange;
  border-color: orange;
}</code></pre>
      <p>空格表示後代關係：只要 <code>a</code> 在 <code>.nav</code> 裡，不管隔幾層都會被選到。</p>
    </section>
  </main>
</body>
</html>
