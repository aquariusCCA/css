<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>並集選擇器 Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <header>
      <p class="eyebrow">複合選擇器</p>
      <h1>並集選擇器讓多個 selector 共用樣式</h1>
      <p class="intro">觀察 <code>h2, p, .note li</code> 會把同一組文字顏色套用到三組不同目標上。</p>
    </header>

    <section class="comparison" aria-label="錯誤與正確比較">
      <article class="panel wrong">
        <h2>少了逗號：h2 p</h2>
        <div class="sample">
          <h2>最新消息</h2>
          <p>這是一段說明。</p>
          <ul class="note">
            <li>重點一</li>
            <li>重點二</li>
          </ul>
        </div>
        <pre><code>h2 p {
  color: pink;
}</code></pre>
      </article>

      <article class="panel correct">
        <h2>有逗號：h2, p, .note li</h2>
        <div class="sample">
          <h2>最新消息</h2>
          <p>這是一段說明。</p>
          <ul class="note">
            <li>重點一</li>
            <li>重點二</li>
          </ul>
        </div>
        <pre><code>h2,
p,
.note li {
  color: pink;
}</code></pre>
      </article>
    </section>
  </main>
</body>
</html>
