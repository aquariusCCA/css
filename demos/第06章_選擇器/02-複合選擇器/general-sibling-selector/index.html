<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通用兄弟選擇器 Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <header>
      <p class="eyebrow">複合選擇器</p>
      <h1>通用兄弟選擇器選後方所有同層元素</h1>
      <p class="intro">觀察 <code>h3 ~ p</code> 會選到 <code>h3</code> 後方、同一層的所有 <code>p</code>。</p>
    </header>

    <section class="comparison" aria-label="修改前與修改後比較">
      <article class="panel before">
        <h2>修改前</h2>
        <p>前言段落</p>
        <h3>章節標題</h3>
        <p>第一段說明</p>
        <p>第二段說明</p>
      </article>

      <article class="panel after">
        <h2>修改後：h3 ~ p</h2>
        <p>前言段落</p>
        <h3>章節標題</h3>
        <p>第一段說明</p>
        <p>第二段說明</p>
      </article>
    </section>

    <section class="rule-card">
      <h2>主要 CSS 規則</h2>
      <pre><code>h3 ~ p {
  color: red;
}</code></pre>
      <p><code>~</code> 只會往後找同一層元素，不會選到標題前面的段落。</p>
    </section>
  </main>
</body>
</html>
