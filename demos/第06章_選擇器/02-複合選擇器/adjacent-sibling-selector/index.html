<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>相鄰兄弟選擇器 Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <header>
      <p class="eyebrow">複合選擇器</p>
      <h1>相鄰兄弟選擇器只選緊接的下一個元素</h1>
      <p class="intro">觀察 <code>h2 + p</code> 只選到緊接在 <code>h2</code> 後面的第一個 <code>p</code>。</p>
    </header>

    <section class="comparison" aria-label="修改前與修改後比較">
      <article class="panel before">
        <h2>修改前</h2>
        <p>前言段落</p>
        <h3>章節標題</h3>
        <p>第一段說明</p>
        <p>第二段說明</p>
      </article>

      <article class="panel after">
        <h2>修改後：h3 + p</h2>
        <p>前言段落</p>
        <h3>章節標題</h3>
        <p>第一段說明</p>
        <p>第二段說明</p>
      </article>
    </section>

    <section class="rule-card">
      <h2>主要 CSS 規則</h2>
      <pre><code>h3 + p {
  color: red;
}</code></pre>
      <p><code>+</code> 不會往前選，也不會選後面所有段落，只選緊接的下一個兄弟元素。</p>
    </section>
  </main>
</body>
</html>
