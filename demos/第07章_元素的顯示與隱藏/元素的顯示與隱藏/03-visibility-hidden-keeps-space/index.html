<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>visibility hidden 保留空位 Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <header>
      <p class="eyebrow">元素的顯示與隱藏</p>
      <h1><code>visibility: hidden</code> 讓元素看不見，但保留位置</h1>
      <p class="intro">比較正常顯示與 <code>visibility: hidden</code>，觀察第一個盒子看不見時，第二個盒子是否往上補位。</p>
    </header>

    <section class="comparison" aria-label="visibility hidden 修改前後比較">
      <article class="panel before">
        <h2>修改前：頭像區可見</h2>
        <div class="stage">
          <div class="avatar">頭像</div>
          <div class="name">使用者名稱</div>
        </div>
        <pre><code>.avatar {
  visibility: visible;
}</code></pre>
      </article>

      <article class="panel after">
        <h2>修改後：頭像區不可見但仍佔位</h2>
        <div class="stage">
          <div class="avatar">頭像</div>
          <div class="name">使用者名稱</div>
        </div>
        <pre><code>.avatar {
  visibility: hidden;
}</code></pre>
      </article>
    </section>

    <section class="rule-card">
      <h2>主要觀察</h2>
      <p>右側粉色頭像區不可見，但藍色名稱區仍停在原本高度下方。這代表 <code>visibility: hidden</code> 會隱藏元素的可見狀態，但不移除它在版面中的空間。</p>
    </section>
  </main>
</body>
</html>
