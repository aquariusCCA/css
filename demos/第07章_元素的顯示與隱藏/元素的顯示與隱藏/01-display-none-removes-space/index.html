<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>display none 不佔位 Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <header>
      <p class="eyebrow">元素的顯示與隱藏</p>
      <h1><code>display: none</code> 讓元素消失，也讓版面補位</h1>
      <p class="intro">比較加入 <code>display: none</code> 前後，觀察提示區塊消失後，下方內容是否往上移。</p>
    </header>

    <section class="comparison" aria-label="display none 修改前後比較">
      <article class="panel before">
        <h2>修改前：元素仍在版面中</h2>
        <div class="stage">
          <div class="notice">系統維護公告</div>
          <div class="content">主要內容</div>
        </div>
        <pre><code>.notice {
  background-color: pink;
}</code></pre>
      </article>

      <article class="panel after">
        <h2>修改後：元素不顯示也不佔位</h2>
        <div class="stage">
          <div class="notice">系統維護公告</div>
          <div class="content">主要內容</div>
        </div>
        <pre><code>.notice {
  display: none;
}</code></pre>
      </article>
    </section>

    <section class="rule-card">
      <h2>主要觀察</h2>
      <p><code>.notice</code> 是 CSS 的作用對象。右側加入 <code>display: none</code> 後，粉色提示區塊不顯示，也不保留原本高度，所以藍色主要內容往上補位。</p>
    </section>
  </main>
</body>
</html>
