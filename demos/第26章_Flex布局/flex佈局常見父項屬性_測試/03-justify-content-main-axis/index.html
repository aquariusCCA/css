<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>justify-content 控制主軸剩餘空間</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="page">
    <h1>justify-content 控制主軸剩餘空間</h1>
    <p class="intro">父容器比三個子元素總寬還寬時，`justify-content` 決定主軸上剩餘空間放在哪裡。</p>

    <section class="stack">
      <article class="panel">
        <h2>flex-start：剩餘空間留在後方</h2>
        <div class="layout start">
          <div class="item">1</div>
          <div class="item">2</div>
          <div class="item">3</div>
        </div>
      </article>

      <article class="panel">
        <h2>center：整組項目置中</h2>
        <div class="layout center">
          <div class="item">1</div>
          <div class="item">2</div>
          <div class="item">3</div>
        </div>
      </article>

      <article class="panel">
        <h2>space-between：剩餘空間放在項目之間</h2>
        <div class="layout between">
          <div class="item">1</div>
          <div class="item">2</div>
          <div class="item">3</div>
        </div>
      </article>
    </section>

    <p class="note">觀察重點：`justify-content` 控制主軸，不是永遠代表水平；這裡是因為主軸維持預設 `row`。</p>
  </main>
</body>
</html>
