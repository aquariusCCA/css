<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>align-content 控制多行側軸分配</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="page">
    <h1>align-content 控制多行側軸分配</h1>
    <p class="intro">`align-content` 要在已形成多行，且側軸有剩餘空間時才容易看出效果。</p>

    <section class="compare">
      <article class="panel">
        <h2>flex-start：多行靠側軸起點</h2>
        <div class="layout start">
          <div class="item">1</div>
          <div class="item">2</div>
          <div class="item">3</div>
          <div class="item">4</div>
          <div class="item">5</div>
          <div class="item">6</div>
        </div>
      </article>

      <article class="panel">
        <h2>space-between：多行分散到兩端</h2>
        <div class="layout between">
          <div class="item">1</div>
          <div class="item">2</div>
          <div class="item">3</div>
          <div class="item">4</div>
          <div class="item">5</div>
          <div class="item">6</div>
        </div>
      </article>
    </section>

    <p class="note">觀察重點：這兩組都先設定 `flex-wrap: wrap`，否則沒有多行可讓 `align-content` 分配。</p>
  </main>
</body>
</html>
