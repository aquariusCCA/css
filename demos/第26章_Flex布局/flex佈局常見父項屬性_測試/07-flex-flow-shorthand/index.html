<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>flex-flow 同時設定方向與換行</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="page">
    <h1>flex-flow 同時設定方向與換行</h1>
    <p class="intro">`flex-flow` 是 `flex-direction` 與 `flex-wrap` 的簡寫，不包含主軸或側軸對齊。</p>

    <section class="compare">
      <article class="panel">
        <h2>分開寫</h2>
        <div class="layout longhand">
          <div class="item">1</div>
          <div class="item">2</div>
          <div class="item">3</div>
          <div class="item">4</div>
          <div class="item">5</div>
        </div>
        <pre><code>flex-direction: row;
flex-wrap: wrap;</code></pre>
      </article>

      <article class="panel">
        <h2>使用 flex-flow</h2>
        <div class="layout shorthand">
          <div class="item">1</div>
          <div class="item">2</div>
          <div class="item">3</div>
          <div class="item">4</div>
          <div class="item">5</div>
        </div>
        <pre><code>flex-flow: row wrap;</code></pre>
      </article>
    </section>

    <p class="note">觀察重點：兩邊畫面相同，因為右邊的簡寫等同於左邊兩條宣告。</p>
  </main>
</body>
</html>
