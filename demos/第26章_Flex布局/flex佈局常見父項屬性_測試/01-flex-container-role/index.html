<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>display: flex 寫在父元素上</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="page">
    <h1>display: flex 寫在父元素上</h1>
    <p class="intro">同樣三個子元素，只有父元素成為 flex container 時，直接子元素才會被 Flex 模型排列。</p>

    <section class="compare" aria-label="normal flow and flex comparison">
      <article class="panel">
        <h2>未設定 Flex</h2>
        <div class="layout normal">
          <div class="item">1</div>
          <div class="item">2</div>
          <div class="item">3</div>
        </div>
        <pre><code>.layout {
  width: 420px;
}</code></pre>
      </article>

      <article class="panel">
        <h2>父元素設定 Flex</h2>
        <div class="layout flex">
          <div class="item">1</div>
          <div class="item">2</div>
          <div class="item">3</div>
        </div>
        <pre><code>.layout {
  display: flex;
}</code></pre>
      </article>
    </section>

    <p class="note">觀察重點：Flex 父項屬性要寫在 `.layout`，不是寫在 `.item`。</p>
  </main>
</body>
</html>
