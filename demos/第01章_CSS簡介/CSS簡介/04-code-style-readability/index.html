<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CSS 程式碼風格</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="lesson">
        <header class="lesson-header">
            <p class="eyebrow">Demo 04</p>
            <h1>展開風格與緊湊風格的畫面效果相同</h1>
            <p>兩邊使用相同的宣告。畫面看起來一樣，但左邊更適合開發時閱讀與修改。</p>
        </header>

        <section class="comparison" aria-label="CSS 程式碼風格對照">
            <article class="panel">
                <p class="panel-label">展開風格</p>
                <h2 class="expanded-demo">CSS 簡介</h2>
                <pre><code>.expanded-demo {
    color: #c2410c;
    font-size: 40px;
}</code></pre>
            </article>

            <article class="panel">
                <p class="panel-label">緊湊風格</p>
                <h2 class="compact-demo">CSS 簡介</h2>
                <pre><code>.compact-demo{color:#c2410c;font-size:40px;}</code></pre>
            </article>
        </section>
    </main>
</body>
</html>
