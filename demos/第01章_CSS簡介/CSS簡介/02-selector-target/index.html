<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Selector 作用對象</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="lesson">
        <header class="lesson-header">
            <p class="eyebrow">Demo 02</p>
            <h1>selector 必須選到元素，樣式才會生效</h1>
            <p>同樣是設定紅色，左邊的 selector 沒有匹配到元素，所以段落不會變紅。</p>
        </header>

        <section class="comparison" aria-label="selector 是否匹配對照">
            <article class="panel missed">
                <p class="panel-label">沒有匹配到：CSS 寫 h1，HTML 只有 p</p>
                <div class="sample">
                    <p>CSS 簡介</p>
                </div>
                <pre><code>.missed h1 {
    color: #c2410c;
}</code></pre>
            </article>

            <article class="panel matched">
                <p class="panel-label">有匹配到：CSS 寫 h1，HTML 也有 h1</p>
                <div class="sample">
                    <h2>CSS 簡介</h2>
                </div>
                <pre><code>.matched h2 {
    color: #c2410c;
}</code></pre>
            </article>
        </section>
    </main>
</body>
</html>
