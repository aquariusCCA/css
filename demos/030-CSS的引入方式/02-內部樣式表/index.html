<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>內部樣式表 Demo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <!-- Source notes: notes/030-CSS的引入方式/02-內部樣式表.md -->
  <main class="demo-shell">
    <section class="intro" aria-labelledby="page-title">
      <p class="kicker">CSS 引入方式</p>
      <h1 id="page-title">內部樣式表</h1>
      <p>CSS 集中寫在同一份 HTML 的 <code>&lt;style&gt;</code> 中，通常放在 <code>&lt;head&gt;</code> 裡。</p>
    </section>

    <section class="controls" aria-label="內部樣式控制">
      <button class="mode-button is-active" type="button" data-selector="p">選擇器 p</button>
      <button class="mode-button" type="button" data-selector=".notice">選擇器 .notice</button>
      <button class="mode-button" type="button" data-selector="h2">選擇器 h2</button>
    </section>

    <section class="layout">
      <article class="panel">
        <h2>HTML 文件中的 style</h2>
        <pre><code id="codeOutput"></code></pre>
      </article>

      <article class="panel browser">
        <h2>目前頁面的結果</h2>
        <div class="page-preview" id="pagePreview">
          <h2>春季活動</h2>
          <p>第一段內容會依選擇器變化。</p>
          <p class="notice">這一段有 notice class。</p>
          <div>這個 div 沒有被目前規則選到。</div>
        </div>
        <p class="scope-note" id="scopeNote"></p>
      </article>
    </section>
  </main>
  <script src="./script.js"></script>
</body>
</html>
