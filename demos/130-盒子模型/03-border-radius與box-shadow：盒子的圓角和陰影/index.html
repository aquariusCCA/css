<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>border-radius 與 box-shadow Demo</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #263241;
      --muted: #667085;
      --line: #d9e1ea;
      --surface: #ffffff;
      --soft: #f5f7fb;
      --accent: #7c3aed;
      --green: #0f766e;
      font-family: "Segoe UI", "Noto Sans TC", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(135deg, #fafafa 0%, #f0f9ff 46%, #f7fee7 100%);
    }

    .demo-shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    .kicker {
      margin: 0 0 8px;
      color: var(--green);
      font-weight: 800;
    }

    h1,
    h2,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 10px;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.1;
    }

    .intro {
      max-width: 820px;
    }

    .intro p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.8;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 12px;
      margin: 22px 0;
    }

    .button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .button.is-active {
      border-color: var(--green);
      background: #ccfbf1;
      color: #115e59;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 18px 42px rgba(38, 50, 65, 0.08);
      overflow: hidden;
    }

    .panel h2 {
      margin: 0;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      font-size: 1.05rem;
    }

    .sliders {
      padding: 18px;
    }

    .control {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-weight: 800;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--green);
    }

    .check {
      display: flex;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-weight: 800;
    }

    .stage {
      display: grid;
      place-items: center;
      min-height: 360px;
      padding: 34px;
      background: var(--soft);
    }

    .card-preview {
      display: grid;
      place-items: center;
      width: 260px;
      height: 180px;
      border: 4px solid #312e81;
      color: #312e81;
      background: linear-gradient(135deg, #dbeafe, #ede9fe);
      font-size: 1.25rem;
      font-weight: 900;
      transition: border-radius 160ms ease, box-shadow 160ms ease, width 160ms ease, height 160ms ease;
    }

    .note {
      margin: 0;
      padding: 14px 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-weight: 800;
      line-height: 1.7;
    }

    pre {
      margin: 0;
      padding: 18px;
      overflow: auto;
      color: #f8fbff;
      background: #182236;
      line-height: 1.7;
    }

    code {
      font-family: Consolas, "Courier New", monospace;
    }

    @media (max-width: 900px) {
      .layout,
      .controls {
        grid-template-columns: 1fr;
      }

      .demo-shell {
        width: min(100% - 20px, 1120px);
        padding: 22px 0;
      }
    }
  </style>
</head>
<body>
  <!-- Source notes: notes/130-盒子模型/03-border-radius與box-shadow：盒子的圓角和陰影.md -->
  <main class="demo-shell">
    <section class="intro" aria-labelledby="page-title">
      <p class="kicker">圓角與陰影</p>
      <h1 id="page-title">圓角改變外形，陰影不改變盒子尺寸</h1>
      <p>`border-radius` 控制角的圓弧；`box-shadow` 控制陰影偏移、模糊、擴張和內陰影，不會把版面推開。</p>
    </section>

    <div class="controls" aria-label="預設形狀">
      <button class="button is-active" type="button" data-preset="rounded">圓角卡片</button>
      <button class="button" type="button" data-preset="pill">膠囊形</button>
      <button class="button" type="button" data-preset="circle">正圓</button>
      <button class="button" type="button" data-preset="corners">四角不同</button>
      <button class="button" type="button" data-preset="softShadow">柔和陰影</button>
      <button class="button" type="button" data-preset="inset">內陰影</button>
    </div>

    <section class="layout">
      <article class="panel">
        <h2>細部調整</h2>
        <div class="sliders">
          <div class="control">
            <label for="radius">border-radius <span id="radiusValue">24px</span></label>
            <input id="radius" type="range" min="0" max="130" value="24">
          </div>
          <div class="control">
            <label for="xShadow">水平陰影 <span id="xValue">18px</span></label>
            <input id="xShadow" type="range" min="-40" max="40" value="18">
          </div>
          <div class="control">
            <label for="yShadow">垂直陰影 <span id="yValue">22px</span></label>
            <input id="yShadow" type="range" min="-40" max="40" value="22">
          </div>
          <div class="control">
            <label for="blurShadow">模糊半徑 <span id="blurValue">30px</span></label>
            <input id="blurShadow" type="range" min="0" max="60" value="30">
          </div>
          <div class="control">
            <label for="spreadShadow">擴張半徑 <span id="spreadValue">0px</span></label>
            <input id="spreadShadow" type="range" min="-20" max="30" value="0">
          </div>
          <label class="check"><input id="insetShadow" type="checkbox"> 使用 inset 內陰影</label>
        </div>
      </article>

      <article class="panel">
        <h2>展示結果</h2>
        <div class="stage">
          <div class="card-preview" id="preview">box</div>
        </div>
        <p class="note" id="noteOutput">如果盒子寬高相同，`border-radius: 50%` 才會變成正圓。</p>
        <pre><code id="codeOutput"></code></pre>
      </article>
    </section>
  </main>

  <script>
    const buttons = [...document.querySelectorAll(".button")];
    const inputs = {
      radius: document.querySelector("#radius"),
      x: document.querySelector("#xShadow"),
      y: document.querySelector("#yShadow"),
      blur: document.querySelector("#blurShadow"),
      spread: document.querySelector("#spreadShadow"),
      inset: document.querySelector("#insetShadow")
    };
    const preview = document.querySelector("#preview");
    const codeOutput = document.querySelector("#codeOutput");
    const noteOutput = document.querySelector("#noteOutput");

    const presets = {
      rounded: { radius: 24, x: 18, y: 22, blur: 30, spread: 0, inset: false, square: false, note: "圓角卡片常用小到中等的 radius，陰影只影響視覺層次，不改變佔位。" },
      pill: { radius: 130, x: 0, y: 12, blur: 22, spread: 0, inset: false, square: false, note: "膠囊形常用很大的 radius，例如 999px 或足夠大的數值。" },
      circle: { radius: 130, x: 0, y: 16, blur: 28, spread: 0, inset: false, square: true, note: "正圓需要盒子本身是正方形，再搭配 50% 或足夠大的圓角。" },
      corners: { radius: 36, x: 14, y: 14, blur: 20, spread: -4, inset: false, square: false, note: "單一滑桿示範的是四角同值；實務也可寫四個值分別控制四角。" },
      softShadow: { radius: 18, x: 0, y: 26, blur: 42, spread: -10, inset: false, square: false, note: "柔和陰影通常使用較大的 blur 與負 spread，讓陰影邊緣更輕。" },
      inset: { radius: 24, x: 0, y: 10, blur: 24, spread: 0, inset: true, square: false, note: "`inset` 是內陰影。沒有 `outset` 關鍵字，外陰影是預設行為。" }
    };

    function setPreset(name) {
      const preset = presets[name];
      inputs.radius.value = preset.radius;
      inputs.x.value = preset.x;
      inputs.y.value = preset.y;
      inputs.blur.value = preset.blur;
      inputs.spread.value = preset.spread;
      inputs.inset.checked = preset.inset;
      preview.style.width = preset.square ? "190px" : "260px";
      preview.style.height = preset.square ? "190px" : "180px";
      noteOutput.textContent = preset.note;
      buttons.forEach((button) => button.classList.toggle("is-active", button.dataset.preset === name));
      render();
    }

    function render() {
      const radius = Number(inputs.radius.value);
      const x = Number(inputs.x.value);
      const y = Number(inputs.y.value);
      const blur = Number(inputs.blur.value);
      const spread = Number(inputs.spread.value);
      const inset = inputs.inset.checked ? "inset " : "";

      document.querySelector("#radiusValue").textContent = `${radius}px`;
      document.querySelector("#xValue").textContent = `${x}px`;
      document.querySelector("#yValue").textContent = `${y}px`;
      document.querySelector("#blurValue").textContent = `${blur}px`;
      document.querySelector("#spreadValue").textContent = `${spread}px`;

      preview.style.borderRadius = `${radius}px`;
      preview.style.boxShadow = `${inset}${x}px ${y}px ${blur}px ${spread}px rgba(49, 46, 129, 0.28)`;
      codeOutput.textContent = `.box {
  border-radius: ${radius}px;
  box-shadow: ${inset}${x}px ${y}px ${blur}px ${spread}px rgba(49, 46, 129, 0.28);
}

/* box-shadow 不會改變盒模型尺寸，只影響視覺繪製。 */`;
    }

    buttons.forEach((button) => button.addEventListener("click", () => setPreset(button.dataset.preset)));
    Object.values(inputs).forEach((input) => input.addEventListener("input", render));
    setPreset("rounded");
  </script>
</body>
</html>
