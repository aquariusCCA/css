<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>margin Demo</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #26313f;
      --muted: #667085;
      --line: #d8e1ea;
      --surface: #ffffff;
      --soft: #f5f8fb;
      --accent: #0f766e;
      --blue: #2563eb;
      --orange: #d97706;
      font-family: "Segoe UI", "Noto Sans TC", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(135deg, #f8fafc 0%, #ecfdf5 48%, #eff6ff 100%);
    }

    .demo-shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    .intro {
      max-width: 820px;
    }

    .kicker {
      margin: 0 0 8px;
      color: var(--accent);
      font-weight: 800;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 10px;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.1;
    }

    .intro p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.8;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 22px 0;
    }

    .tab {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 16px;
      color: var(--ink);
      background: #fff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .tab.is-active {
      border-color: var(--accent);
      background: #ccfbf1;
      color: #115e59;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 18px 42px rgba(38, 49, 63, 0.08);
      overflow: hidden;
    }

    .panel h2 {
      margin: 0;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      font-size: 1.05rem;
    }

    .controls {
      padding: 18px;
    }

    .control {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-weight: 800;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .stage {
      min-height: 380px;
      padding: 24px;
      background: var(--soft);
    }

    .view {
      display: none;
    }

    .view.is-active {
      display: block;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .demo-box {
      min-height: 170px;
      border: 2px solid #94a3b8;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .demo-box h3 {
      margin: 0;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      font-size: 1rem;
    }

    .padding-target,
    .margin-target {
      width: 160px;
      min-height: 82px;
      border: 4px solid #2563eb;
      background: #bfdbfe;
      color: #1e3a8a;
      font-weight: 900;
      transition: margin 160ms ease, padding 160ms ease;
    }

    .padding-target {
      padding: 28px;
    }

    .margin-target {
      margin: 28px;
      padding: 12px;
    }

    .collapse-stack {
      border: 1px dashed #94a3b8;
      background: #fff;
      padding: 18px;
    }

    .stack-item {
      display: grid;
      place-items: center;
      height: 74px;
      border-radius: 8px;
      color: #fff;
      font-weight: 900;
    }

    .stack-a {
      margin-bottom: 80px;
      background: var(--blue);
    }

    .stack-b {
      margin-top: 120px;
      background: var(--orange);
    }

    .parent-demo {
      border: 3px solid #0f766e;
      background: #ccfbf1;
    }

    .parent-demo.fix-padding {
      padding-top: 1px;
    }

    .parent-demo.fix-overflow {
      overflow: hidden;
    }

    .child-demo {
      height: 72px;
      margin-top: 70px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: #0f766e;
      font-weight: 900;
    }

    .note {
      margin: 14px 0 0;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.7;
    }

    pre {
      margin: 0;
      padding: 18px;
      overflow: auto;
      color: #f8fbff;
      background: #172033;
      line-height: 1.7;
    }

    code {
      font-family: Consolas, "Courier New", monospace;
    }

    @media (max-width: 860px) {
      .layout,
      .compare-grid {
        grid-template-columns: 1fr;
      }

      .demo-shell {
        width: min(100% - 20px, 1120px);
        padding: 22px 0;
      }
    }
  </style>
</head>
<body>
  <!-- Source notes: notes/130-盒子模型/05-margin：盒子與盒子之間的距離.md -->
  <main class="demo-shell">
    <section class="intro" aria-labelledby="page-title">
      <p class="kicker">margin</p>
      <h1 id="page-title">margin 是盒子外部的距離</h1>
      <p>margin 不會被元素背景色填滿，垂直方向還有外距合併現象，這也是初學者最容易誤判的地方。</p>
    </section>

    <div class="tabs" aria-label="展示模式">
      <button class="tab is-active" type="button" data-view="compare">margin / padding</button>
      <button class="tab" type="button" data-view="sibling">兄弟外距合併</button>
      <button class="tab" type="button" data-view="parent">父子外距合併</button>
    </div>

    <section class="layout">
      <article class="panel">
        <h2>控制項</h2>
        <div class="controls">
          <div class="control">
            <label for="distance">距離值 <span id="distanceValue">28px</span></label>
            <input id="distance" type="range" min="0" max="60" value="28">
          </div>
          <div class="control">
            <label><input id="parentPaddingFix" type="checkbox"> 父元素加 `padding-top: 1px`</label>
          </div>
          <div class="control">
            <label><input id="parentOverflowFix" type="checkbox"> 父元素加 `overflow: hidden`</label>
          </div>
        </div>
      </article>

      <article class="panel">
        <h2>可觀察結果</h2>
        <div class="stage">
          <div class="view is-active" data-view-panel="compare">
            <div class="compare-grid">
              <div class="demo-box">
                <h3>padding：背景延伸到內距</h3>
                <div class="padding-target" id="paddingTarget">content</div>
              </div>
              <div class="demo-box">
                <h3>margin：外部空白不吃背景</h3>
                <div class="margin-target" id="marginTarget">content</div>
              </div>
            </div>
          </div>

          <div class="view" data-view-panel="sibling">
            <div class="collapse-stack">
              <div class="stack-item stack-a">上一個盒子：margin-bottom 80px</div>
              <div class="stack-item stack-b">下一個盒子：margin-top 120px</div>
            </div>
            <p class="note">兩個垂直外距會合併，距離取較大的 120px，而不是 80px + 120px。</p>
          </div>

          <div class="view" data-view-panel="parent">
            <div class="parent-demo" id="parentDemo">
              <div class="child-demo">子元素 margin-top 70px</div>
            </div>
            <p class="note" id="parentNote">沒有阻隔時，子元素的上外距可能和父元素外距合併，看起來像把父元素往下推。</p>
          </div>
        </div>
        <pre><code id="codeOutput"></code></pre>
      </article>
    </section>
  </main>

  <script>
    const tabs = [...document.querySelectorAll(".tab")];
    const panels = [...document.querySelectorAll("[data-view-panel]")];
    const distance = document.querySelector("#distance");
    const paddingTarget = document.querySelector("#paddingTarget");
    const marginTarget = document.querySelector("#marginTarget");
    const parentDemo = document.querySelector("#parentDemo");
    const paddingFix = document.querySelector("#parentPaddingFix");
    const overflowFix = document.querySelector("#parentOverflowFix");
    const codeOutput = document.querySelector("#codeOutput");
    const parentNote = document.querySelector("#parentNote");
    let activeView = "compare";

    function render() {
      const value = Number(distance.value);
      document.querySelector("#distanceValue").textContent = `${value}px`;
      paddingTarget.style.padding = `${value}px`;
      marginTarget.style.margin = `${value}px`;

      parentDemo.classList.toggle("fix-padding", paddingFix.checked);
      parentDemo.classList.toggle("fix-overflow", overflowFix.checked);
      parentNote.textContent = paddingFix.checked || overflowFix.checked
        ? "父元素建立阻隔後，子元素的 margin-top 會留在父元素內部觀察。"
        : "沒有阻隔時，子元素的上外距可能和父元素外距合併，看起來像把父元素往下推。";

      let code = `.padding-box {
  padding: ${value}px;
}

.margin-box {
  margin: ${value}px;
}`;

      if (activeView === "sibling") {
        code = `.box-a {
  margin-bottom: 80px;
}

.box-b {
  margin-top: 120px;
}

/* 垂直外距合併後，實際距離是 120px。 */`;
      }

      if (activeView === "parent") {
        code = `.child {
  margin-top: 70px;
}

.parent {
${paddingFix.checked ? "  padding-top: 1px;\n" : ""}${overflowFix.checked ? "  overflow: hidden;\n" : ""}}`;
      }

      codeOutput.textContent = code;
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        activeView = tab.dataset.view;
        tabs.forEach((item) => item.classList.toggle("is-active", item === tab));
        panels.forEach((panel) => panel.classList.toggle("is-active", panel.dataset.viewPanel === activeView));
        render();
      });
    });

    [distance, paddingFix, overflowFix].forEach((node) => node.addEventListener("input", render));
    render();
  </script>
</body>
</html>
