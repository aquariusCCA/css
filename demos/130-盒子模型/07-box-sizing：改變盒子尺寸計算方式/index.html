<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>box-sizing Demo</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #26313f;
      --muted: #667085;
      --line: #d8e1ea;
      --surface: #ffffff;
      --soft: #f5f8fb;
      --accent: #0f766e;
      --red: #dc2626;
      --blue: #2563eb;
      font-family: "Segoe UI", "Noto Sans TC", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(135deg, #f8fafc 0%, #eef6ff 48%, #ecfdf5 100%);
    }

    .demo-shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    .intro {
      max-width: 820px;
    }

    .kicker {
      margin: 0 0 8px;
      color: var(--accent);
      font-weight: 800;
    }

    h1,
    h2,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 10px;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.1;
    }

    .intro p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.8;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 16px;
      margin-top: 22px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 18px 42px rgba(38, 49, 63, 0.08);
      overflow: hidden;
    }

    .panel h2 {
      margin: 0;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      font-size: 1.05rem;
    }

    .controls {
      padding: 18px;
    }

    .control {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-weight: 800;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .stage {
      padding: 24px;
      background: var(--soft);
    }

    .compare {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    .sample {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      background: #fff;
    }

    .sample h3 {
      margin: 0 0 14px;
      font-size: 1rem;
    }

    .box {
      display: grid;
      place-items: center;
      min-height: 100px;
      border-style: solid;
      background: #dbeafe;
      color: #1e3a8a;
      font-weight: 900;
      transition: width 160ms ease, padding 160ms ease, border-width 160ms ease;
    }

    .content-box {
      box-sizing: content-box;
      border-color: var(--red);
    }

    .border-box {
      box-sizing: border-box;
      border-color: var(--blue);
    }

    .metric {
      margin: 12px 0 0;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.6;
    }

    .warning {
      margin: 16px 0 0;
      border-left: 4px solid #f59e0b;
      padding: 10px 12px;
      color: #92400e;
      background: #fffbeb;
      font-weight: 800;
      line-height: 1.7;
    }

    pre {
      margin: 0;
      padding: 18px;
      overflow: auto;
      color: #f8fbff;
      background: #172033;
      line-height: 1.7;
    }

    code {
      font-family: Consolas, "Courier New", monospace;
    }

    @media (max-width: 860px) {
      .layout,
      .compare {
        grid-template-columns: 1fr;
      }

      .demo-shell {
        width: min(100% - 20px, 1120px);
        padding: 22px 0;
      }
    }
  </style>
</head>
<body>
  <!-- Source notes: notes/130-盒子模型/07-box-sizing：改變盒子尺寸計算方式.md -->
  <main class="demo-shell">
    <section class="intro" aria-labelledby="page-title">
      <p class="kicker">box-sizing</p>
      <h1 id="page-title">同一個 width，在兩種尺寸模型下結果不同</h1>
      <p>`content-box` 把 width 當內容寬；`border-box` 把 width 當含 padding 與 border 的總寬。</p>
    </section>

    <section class="layout">
      <article class="panel">
        <h2>控制項</h2>
        <div class="controls">
          <div class="control">
            <label for="baseWidth">width <span id="widthValue">220px</span></label>
            <input id="baseWidth" type="range" min="160" max="320" value="220">
          </div>
          <div class="control">
            <label for="paddingSize">padding <span id="paddingValue">24px</span></label>
            <input id="paddingSize" type="range" min="0" max="70" value="24">
          </div>
          <div class="control">
            <label for="borderSize">border <span id="borderValue">12px</span></label>
            <input id="borderSize" type="range" min="0" max="34" value="12">
          </div>
        </div>
      </article>

      <article class="panel">
        <h2>對照結果</h2>
        <div class="stage">
          <div class="compare">
            <div class="sample">
              <h3>content-box</h3>
              <div class="box content-box" id="contentBox">content-box</div>
              <p class="metric" id="contentMetric">實際寬度：292px</p>
            </div>
            <div class="sample">
              <h3>border-box</h3>
              <div class="box border-box" id="borderBox">border-box</div>
              <p class="metric" id="borderMetric">實際寬度：220px</p>
            </div>
          </div>
          <p class="warning" id="warningText">border-box 比較好控版面，但 padding 或 border 太大時，內容區域仍會被壓縮。</p>
        </div>
        <pre><code id="codeOutput"></code></pre>
      </article>
    </section>
  </main>

  <script>
    const controls = {
      width: document.querySelector("#baseWidth"),
      padding: document.querySelector("#paddingSize"),
      border: document.querySelector("#borderSize")
    };
    const contentBox = document.querySelector("#contentBox");
    const borderBox = document.querySelector("#borderBox");
    const codeOutput = document.querySelector("#codeOutput");
    const warningText = document.querySelector("#warningText");

    function render() {
      const width = Number(controls.width.value);
      const padding = Number(controls.padding.value);
      const border = Number(controls.border.value);
      const contentTotal = width + padding * 2 + border * 2;
      const borderContent = width - padding * 2 - border * 2;

      document.querySelector("#widthValue").textContent = `${width}px`;
      document.querySelector("#paddingValue").textContent = `${padding}px`;
      document.querySelector("#borderValue").textContent = `${border}px`;

      [contentBox, borderBox].forEach((box) => {
        box.style.width = `${width}px`;
        box.style.padding = `${padding}px`;
        box.style.borderWidth = `${border}px`;
      });

      document.querySelector("#contentMetric").textContent = `實際寬度：${contentTotal}px`;
      document.querySelector("#borderMetric").textContent = `實際寬度：${width}px，內容寬約 ${Math.max(0, borderContent)}px`;
      warningText.textContent = borderContent <= 20
        ? "注意：border-box 會保住總寬，但 padding 和 border 太大時，內容區域會被壓到很小。"
        : "border-box 比較好控版面，但 padding 或 border 太大時，內容區域仍會被壓縮。";

      codeOutput.textContent = `.content-box {
  box-sizing: content-box;
  width: ${width}px;
  padding: ${padding}px;
  border: ${border}px solid #dc2626;
  /* 實際寬度：${contentTotal}px */
}

.border-box {
  box-sizing: border-box;
  width: ${width}px;
  padding: ${padding}px;
  border: ${border}px solid #2563eb;
  /* 實際寬度仍是 ${width}px */
}

* {
  box-sizing: border-box;
}`;
    }

    Object.values(controls).forEach((control) => control.addEventListener("input", render));
    render();
  </script>
</body>
</html>
