<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>border 與 outline Demo</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #253244;
      --muted: #64748b;
      --line: #d7e1ea;
      --surface: #ffffff;
      --soft: #f4f7fb;
      --accent: #2563eb;
      --good: #0f766e;
      --warn: #b45309;
      font-family: "Segoe UI", "Noto Sans TC", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 48%, #ecfeff 100%);
    }

    .demo-shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    .kicker {
      margin: 0 0 8px;
      color: var(--accent);
      font-weight: 800;
    }

    h1,
    h2,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 10px;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.1;
    }

    .intro {
      max-width: 820px;
    }

    .intro p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.8;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 16px;
      margin-top: 22px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 18px 42px rgba(37, 50, 68, 0.08);
      overflow: hidden;
    }

    .panel h2 {
      margin: 0;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      font-size: 1.05rem;
    }

    .controls {
      padding: 18px;
    }

    .control {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-weight: 800;
    }

    input,
    select {
      font: inherit;
      accent-color: var(--accent);
    }

    input[type="range"],
    select {
      width: 100%;
    }

    select {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      background: #fff;
      color: var(--ink);
    }

    .stage {
      display: grid;
      gap: 18px;
      padding: 22px;
      background: var(--soft);
    }

    .measure-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .demo-card {
      min-height: 190px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .demo-card h3 {
      margin: 0 0 16px;
      font-size: 1rem;
    }

    .target-wrap {
      display: inline-grid;
      gap: 10px;
      justify-items: center;
    }

    .target {
      display: grid;
      place-items: center;
      width: 190px;
      height: 96px;
      background: #dbeafe;
      color: #1e3a8a;
      font-weight: 900;
      transition: border-width 160ms ease, outline-width 160ms ease, outline-style 160ms ease;
    }

    .target.border-demo {
      border-color: #ef4444;
    }

    .target.outline-demo {
      border: 0 solid transparent;
      outline-color: #0f766e;
      outline-offset: 4px;
    }

    .size-note {
      margin: 0;
      color: var(--muted);
      font-weight: 800;
    }

    .focus-demo {
      display: inline-flex;
      min-height: 46px;
      align-items: center;
      border: 2px solid #94a3b8;
      border-radius: 8px;
      padding: 0 16px;
      color: #0f172a;
      background: #fff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .focus-demo:focus {
      outline: 4px solid #f59e0b;
      outline-offset: 4px;
    }

    .hint {
      margin: 12px 0 0;
      color: var(--warn);
      font-weight: 800;
      line-height: 1.7;
    }

    pre {
      margin: 0;
      padding: 18px;
      overflow: auto;
      color: #f8fbff;
      background: #182236;
      line-height: 1.7;
    }

    code {
      font-family: Consolas, "Courier New", monospace;
    }

    @media (max-width: 860px) {
      .layout,
      .measure-row {
        grid-template-columns: 1fr;
      }

      .demo-shell {
        width: min(100% - 20px, 1120px);
        padding: 22px 0;
      }
    }
  </style>
</head>
<body>
  <!-- Source notes: notes/130-盒子模型/02-border與outline：邊框和外輪廓的差異.md -->
  <main class="demo-shell">
    <section class="intro" aria-labelledby="page-title">
      <p class="kicker">border 與 outline</p>
      <h1 id="page-title">border 會改變盒子尺寸，outline 不佔版面</h1>
      <p>border 是盒模型的一部分；outline 畫在 border 外面，常用於提示 focus 狀態，而且不會推開周圍元素。</p>
    </section>

    <section class="layout">
      <article class="panel">
        <h2>控制項</h2>
        <div class="controls">
          <div class="control">
            <label for="lineWidth">線寬 <span id="lineWidthValue">10px</span></label>
            <input id="lineWidth" type="range" min="0" max="24" value="10">
          </div>
          <div class="control">
            <label for="lineStyle">線條樣式</label>
            <select id="lineStyle">
              <option value="solid">solid</option>
              <option value="dashed">dashed</option>
              <option value="dotted">dotted</option>
              <option value="none">none</option>
            </select>
          </div>
          <div class="control">
            <label><input id="showFocus" type="checkbox" checked> 保留 focus outline 示範</label>
          </div>
        </div>
      </article>

      <article class="panel">
        <h2>尺寸對照</h2>
        <div class="stage">
          <div class="measure-row">
            <div class="demo-card">
              <h3>使用 border</h3>
              <div class="target-wrap">
                <div class="target border-demo" id="borderTarget">content</div>
                <p class="size-note" id="borderMetric">實際寬度：210px</p>
              </div>
            </div>

            <div class="demo-card">
              <h3>使用 outline</h3>
              <div class="target-wrap">
                <div class="target outline-demo" id="outlineTarget">content</div>
                <p class="size-note" id="outlineMetric">實際寬度：190px</p>
              </div>
            </div>
          </div>

          <div class="demo-card" id="focusCard">
            <h3>focus outline</h3>
            <button class="focus-demo" type="button">按 Tab 或點我取得焦點</button>
            <p class="hint">不要直接移除可見 outline；若要客製化，也要提供清楚的焦點提示。</p>
          </div>
        </div>
        <pre><code id="codeOutput"></code></pre>
      </article>
    </section>
  </main>

  <script>
    const widthInput = document.querySelector("#lineWidth");
    const styleInput = document.querySelector("#lineStyle");
    const focusInput = document.querySelector("#showFocus");
    const borderTarget = document.querySelector("#borderTarget");
    const outlineTarget = document.querySelector("#outlineTarget");
    const borderMetric = document.querySelector("#borderMetric");
    const outlineMetric = document.querySelector("#outlineMetric");
    const widthValue = document.querySelector("#lineWidthValue");
    const focusCard = document.querySelector("#focusCard");
    const codeOutput = document.querySelector("#codeOutput");

    function render() {
      const width = Number(widthInput.value);
      const style = styleInput.value;
      widthValue.textContent = `${width}px`;

      borderTarget.style.borderWidth = `${width}px`;
      borderTarget.style.borderStyle = style;
      outlineTarget.style.outlineWidth = `${width}px`;
      outlineTarget.style.outlineStyle = style;
      focusCard.style.display = focusInput.checked ? "block" : "none";

      const borderBox = 190 + width * 2;
      borderMetric.textContent = `實際寬度：${borderBox}px`;
      outlineMetric.textContent = "實際寬度：190px";

      codeOutput.textContent = `.border-demo {
  width: 190px;
  border: ${width}px ${style} #ef4444;
  /* content-box 下實際寬度：${borderBox}px */
}

.outline-demo {
  width: 190px;
  outline: ${width}px ${style} #0f766e;
  outline-offset: 4px;
  /* outline 不會加入盒模型尺寸 */
}

.focus-demo:focus {
  outline: 4px solid #f59e0b;
  outline-offset: 4px;
}`;
    }

    [widthInput, styleInput, focusInput].forEach((node) => node.addEventListener("input", render));
    styleInput.addEventListener("change", render);
    render();
  </script>
</body>
</html>
