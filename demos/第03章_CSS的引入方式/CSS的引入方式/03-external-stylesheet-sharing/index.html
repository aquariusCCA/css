<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>外部樣式表共用</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="lesson">
        <header class="lesson-header">
            <p class="eyebrow">Demo 03</p>
            <h1>多個 HTML 頁面共用同一份外部 CSS</h1>
            <p>下面兩個預覽頁面內容不同，但都使用 <code>&lt;link rel="stylesheet" href="./shared.css"&gt;</code> 載入同一份 CSS。</p>
        </header>

        <section class="comparison" aria-label="外部樣式表共用對照">
            <article class="panel">
                <p class="panel-label">home.html</p>
                <iframe src="home.html" title="首頁預覽"></iframe>
            </article>

            <article class="panel">
                <p class="panel-label">about.html</p>
                <iframe src="about.html" title="關於頁預覽"></iframe>
            </article>
        </section>

        <section class="rule-box" aria-label="共同引用的外部樣式表">
            <h2>兩個頁面都引用同一份 CSS</h2>
            <pre><code>&lt;link rel="stylesheet" href="./shared.css"&gt;</code></pre>
        </section>
    </main>
</body>
</html>
